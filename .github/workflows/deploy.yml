name: Deploy to DigitalOcean

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT || 22 }}
          script_stop: true
          envs: SITE_URL,WS_URL
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          WS_URL: ${{ secrets.WS_URL }}
        script: |
          cd /var/www/vp-whiteboard

          # Pull latest code
          git fetch origin
          git reset --hard origin/master

          # Create .env file with production values
          cat > .env << EOF
          NUXT_PUBLIC_SITE_URL=$SITE_URL
          NUXT_PUBLIC_WS_URL=$WS_URL
          EOF

          # Install dependencies
          npm install

          # Build the application (with increased heap for small servers)
          NODE_OPTIONS="--max-old-space-size=2048" npm run build

          # Restart PM2 processes
          pm2 restart vp-whiteboard
          pm2 restart vp-ws-server

          # Save PM2 config
          pm2 save

          echo "Deployment successful!"

          # End of deployment script
